persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

log_type error
log_type warning
log_type notice
log_type information

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords

listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwords
MOSQUITTO
