name: lisa-edge-core

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: lisa-mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_BIND_ADDR:-0.0.0.0}:${MQTT_PORT:-1883}:1883"
      - "${MQTT_BIND_ADDR:-0.0.0.0}:${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/mosquitto/config:/mosquitto/config
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/mosquitto/data:/mosquitto/data
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -u \"$${MQTT_USERNAME:-lisa}\" -P \"$${MQTT_PASSWORD:-changeme}\" -t '$$SYS/#' -C 1 -W 5 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME:-lisa}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme}

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: lisa-uptime
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_BIND_ADDR:-0.0.0.0}:${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/uptime-kuma:/app/data

  backup-helper:
    image: alpine:3.20
    container_name: lisa-backup-helper
    restart: unless-stopped
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}:/svr/lisa-edge:ro
      - ${BACKUP_DEST:-/svr/lisa-edge/backups}:/backups
      - ./services/backup-helper:/helper:ro
