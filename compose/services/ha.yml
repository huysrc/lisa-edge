services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: lisa-ha
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
