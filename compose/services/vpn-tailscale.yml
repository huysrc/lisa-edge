services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: lisa-tailscale
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
      #- TS_EXTRA_ARGS=--advertise-routes=192.168.10.0/24,192.168.20.0/24,192.168.30.0/24,192.168.40.0/24
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
