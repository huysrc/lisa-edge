services:
  otbr:
    image: openthread/border-router:latest
    container_name: lisa-otbr
    restart: unless-stopped
    network_mode: host
    privileged: true
    dns:
      - 127.0.0.1
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.forwarding: 1
    devices:
      - ${THREAD_RADIO_DEVICE:-/dev/serial/by-id/YOUR_THREAD_RCP_RADIO}:/dev/ttyThreadRCP
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${DATA_ROOT:-/svr/lisa-edge}/docker/volumes/otbr:/data
    command:
      - --radio-url
      - ${THREAD_RADIO_URL:-spinel+hdlc+uart:///dev/ttyThreadRCP?uart-baudrate=460800}
      - --backbone-interface
      - ${OTBR_BACKBONE_IF:-eth0}
