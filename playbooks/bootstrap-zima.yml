---
- name: Bootstrap LISA ZimaBoard
  hosts: lisa-edge
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        upgrade: dist

    - name: Install base packages
      apt:
        name:
          - curl
          - git
          - ufw
          - fail2ban
          - avahi-daemon
          - ca-certificates
          - gnupg
          - htop
          - nano
          - rsync
          - netcat-openbsd
        state: present

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create LISA directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - /opt/lisa
        - /opt/lisa/compose
        - /opt/lisa/data
        - /opt/lisa/data/mosquitto/config
        - /opt/lisa/data/mosquitto/data
        - /opt/lisa/data/mosquitto/log
        - /opt/lisa/data/homeassistant
        - /opt/lisa/data/zigbee2mqtt
        - /opt/lisa/data/node-red
        - /opt/lisa/data/uptime-kuma
        - /opt/lisa/data/tailscale
        - /opt/lisa/backups
        - /opt/lisa/scripts
        - /opt/lisa/secrets

    - name: Configure UFW
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "1883"
        - "8123"
        - "8080"
        - "1880"
        - "3001"

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Enable services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - docker
        - fail2ban
        - avahi-daemon
