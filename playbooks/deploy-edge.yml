---
- name: Deploy LISA Edge Stack
  hosts: lisa-edge
  become: true

  tasks:
    - name: Copy docker-compose.yml
      copy:
        src: ../compose/docker-compose.yml
        dest: /opt/lisa/compose/docker-compose.yml
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy Mosquitto config
      copy:
        src: ../configs/mosquitto/mosquitto.conf
        dest: /opt/lisa/data/mosquitto/config/mosquitto.conf
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy scripts
      copy:
        src: "../scripts/{{ item }}"
        dest: "/opt/lisa/scripts/{{ item }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - backup.sh
        - healthcheck.sh

    - name: Pull containers
      command: docker compose -f /opt/lisa/compose/docker-compose.yml pull

    - name: Start stack
      command: docker compose -f /opt/lisa/compose/docker-compose.yml up -d

    - name: Run healthcheck
      command: /opt/lisa/scripts/healthcheck.sh
